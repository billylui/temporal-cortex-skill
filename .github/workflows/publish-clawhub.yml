# Publish all skills to ClawHub when a version tag is pushed.
# Can also be triggered manually for retries after transient failures.
#
# Trigger (auto): git tag v0.5.3 && git push origin v0.5.3
# Trigger (manual): gh workflow run publish-clawhub.yml -f version=0.5.3

name: Publish to ClawHub

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Skill version to publish (e.g. 0.5.3). Leave empty to use latest tag."
        required: false
        type: string

jobs:
  publish-clawhub:
    name: Publish ${{ matrix.skill }} to ClawHub
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill:
          - temporal-cortex
          - temporal-cortex-datetime
          - temporal-cortex-scheduling
          - calendar-scheduling    # legacy alias (generated from temporal-cortex)
    steps:
      - uses: actions/checkout@v6

      - name: Generate calendar-scheduling alias
        if: matrix.skill == 'calendar-scheduling'
        run: bash scripts/generate-alias.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install ClawHub CLI
        run: npm install -g clawhub@latest

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate ClawHub
        run: clawhub login --token "$CLAWHUB_TOKEN"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Patch ClawHub CLI (acceptLicenseTerms workaround)
        run: |
          # ClawHub CLI v0.7.0 bug: publish payload missing acceptLicenseTerms field
          # See https://github.com/openclaw/clawhub/issues/672
          # Remove this step once clawhub >= 0.7.1 is released with the fix
          PUBLISH_JS="$(npm root -g)/clawhub/dist/cli/commands/publish.js"
          sed -i 's/slug,/slug, acceptLicenseTerms: true,/' "$PUBLISH_JS"
          echo "Patched $PUBLISH_JS"

      - name: Publish ${{ matrix.skill }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Publishing ${{ matrix.skill }} v${VERSION} to ClawHub..."
          echo "ClawHub CLI version: $(clawhub -V 2>/dev/null || echo 'unknown')"
          clawhub publish skills/${{ matrix.skill }} \
            --slug ${{ matrix.skill }} \
            --name "${{ matrix.skill }}" \
            --version "${VERSION}" \
            --changelog "Release v${VERSION}"
          echo "Published ${{ matrix.skill }} v${VERSION}"
