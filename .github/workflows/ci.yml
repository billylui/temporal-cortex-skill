name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC
  # Platform's release-mcp.yml dispatches this after creating the MCP
  # GitHub Release, so link-check can verify release URLs exist.
  repository_dispatch:
    types: [release-ready]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-skill:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate all SKILL.md files
        run: bash tests/validate-skill.sh

      - name: Validate multi-skill structure
        run: bash tests/validate-structure.sh

  test-security:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run security tests
        run: bash tests/test-security.sh

  lint-scripts:
    name: Lint Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts

  lint-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate preset JSON files
        run: |
          for f in assets/presets/*.json .mcp.json; do
            echo "Validating: $f"
            JSON_FILE="$f" python3 -c "import json, os; json.load(open(os.environ['JSON_FILE']))" || exit 1
          done
          echo "All JSON files valid."

  link-check:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    # Skip on push to main — release URLs may not exist yet (race condition
    # with Platform's release-mcp pipeline which creates the GitHub Release).
    # Runs on: PR (catch broken links before merge), schedule (weekly drift
    # check), and repository_dispatch (triggered by Platform after release).
    if: github.event_name != 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          folder-path: '.'
          config-file: '.github/markdown-link-check-config.json'
